name: CI

# Lightweight CI lane: runs only dependency-light unit tests on a fresh
# pip install. Tests marked `live_llm`, `r_baseline`, `integration`, and
# `e2e` are excluded — they require a real LLM session, an R toolchain
# (Monocle3/Slingshot), real data, or the full pandoc/latexmk stack
# respectively, none of which are provisioned in this lane.
#
# The heavier conda/pandoc/latexmk lane lives in
# `.github/workflows-disabled/ci.yml.template` and is left disabled
# pending the activation criteria documented there.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test runner
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run dependency-light tests
        run: |
          python -m pytest -q tests \
            -m 'not live_llm and not r_baseline and not integration and not e2e'
